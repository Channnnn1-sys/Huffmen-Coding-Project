<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huffman Compression - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-content">
            <div class="logo">
                <i class="fa-solid fa-cube"></i>
                <span>Huffman</span>
            </div>

            <nav class="nav-links">
                <a href="{{ url_for('home') }}" class="nav-item active">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="{{ url_for('compress') }}" class="nav-item">
                    <i class="fa-solid fa-file-zipper"></i>
                    <span>Compress</span>
                </a>
                <a href="{{ url_for('decompress') }}" class="nav-item">
                    <i class="fa-solid fa-box-open"></i>
                    <span>Decompress</span>
                </a>
                <a href="{{ url_for('about') }}" class="nav-item">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>About</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="profile-box">
                <div class="avatar">HC</div>
                <div class="profile-info">
                    <h4>Huffman</h4>
                    <p>Compression Suite</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="hero-section">
            <div class="hero-content">
                <h1>File Compression Tool</h1>
                <p>Powered by Huffman Coding Algorithm</p>
                <div class="hero-buttons">
                    <a href="{{ url_for('compress') }}" class="btn primary large">
                        <i class="fa-solid fa-file-zipper"></i>
                        Compress Files
                    </a>
                    <a href="{{ url_for('decompress') }}" class="btn secondary large">
                        <i class="fa-solid fa-box-open"></i>
                        Decompress Files
                    </a>
                </div>
            </div>
        </div>
    </main>

    <button id="theme-toggle" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>

    <script src="/static/js/app.js"></script>
</body>
</html>
